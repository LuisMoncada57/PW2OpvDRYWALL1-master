<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Opv Drywall</title>
    <script type="module" src="../src/main.js"></script>
</head>
<body>
   {{> header}}
    <section class="gallery">
        <div class="contener">
            <div class="grids">
            <div class="rows">

                <div class="cols">

                    <img src="../assets/imagen2.jpg" alt="Segunda imagen"/>

                </div>

                </div>

                </div>
                <div class="cols">

                    <img src="../assets/imagen5.jpg" alt="Quinta imagen"/>
                </div>
                </div>
                <div class="cols">
                <div class="pic">
                    <img src="../assets/imagen6.jpg" alt="Sexta imagen"/>
                </div>
                </div>
                <div class="cols">
                <div class="pic">
                    <img src="../assets/imagen7.jpg" alt="Septima imagen"/>
                </div>
                </div>
                <div class="cols">

                </div>
