<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Registro</title>
    <script type="module" src="../src/main.js"></script>
</head>

<body class="body-reg">
    {{> header}}

    <main class="main-reg">

        <div class="form-container">
            <h2>Registro</h2>
            <form id="commentForm" novalidate>
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name">
                <span class="error" id="nameError">El nombre es requerido.</span>

                <label for="correo">Email:</label>
                <input type="email" id="email" name="email">
                <span class="error" id="emailError">El email es requerido y debe ser válido.</span>

                <label for="phone">Teléfono:</label>
                <input type="tel" id="phone" name="phone">
                <span class="error" id="phoneError">El número de teléfono es requerido.</span>

                <button id="btnSubmit" type="submit">Enviar</button>
            </form>
        </div>

    </main>
    {{> footer}}

    <script src="../javascript/javascript.js"></script>

</body>

</html>
